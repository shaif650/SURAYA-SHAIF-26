 <script>

    // 1. Unified Data Object
const globalData = {
    contacts1: [
        { name: "Pn. Normizah", phone: "0129543925" },
        { name: "En. Asmawi", phone: "0126641202" },
        { name: "Pn. Norhasliza", phone: "0163670277" }
    ],
    contacts2: [
        { name: "En. Sharafae", phone: "0193044161" },
        { name: "Pn. Jamelah", phone: "01111059133" },
        { name: "Amirul", phone: "0164064161" }
    ]
};

// 2. Helper function to generate list HTML
function generateContactList(contacts) {
    let html = '';
    contacts.forEach(c => {
        const cleanPhone = c.phone.replace(/\s+/g, '');
        const waPhone = cleanPhone.startsWith('6') ? cleanPhone : `6${cleanPhone}`;
        
        html += `
            <div class="contact-row">
                <span class="contact-name">${c.name}</span>
                <div class="contact-actions">
                    <a href="tel:${cleanPhone}">Call</a>
                    <a href="https://wa.me/${waPhone}" target="_blank">WhatsApp</a>
                </div>
            </div>
        `;
    });
    return html;
}

// 3. Populate elements on script load
document.getElementById('contact-list-1').innerHTML = generateContactList(globalData.contacts1);
document.getElementById('contact-list-2').innerHTML = generateContactList(globalData.contacts2);

// 4. Modal Interface State Controls
let currentTabIdx = 0;

function openContactModal() {
    document.getElementById("contactModal").style.display = "flex";
    switchContactTab(0); // Start at page 1 by default
}

function closeContactModal(event) {
    // If user clicks close-btn or outer backdrop overlay, close modal
    if (event.target.classList.contains('modal-overlay') || event.type === 'click' && event.target.className === 'close-btn') {
        document.getElementById("contactModal").style.display = "none";
    }
}

function switchContactTab(index) {
    currentTabIdx = index;
    const track = document.getElementById("sliderTrack");
    const t1 = document.getElementById("tab1");
    const t2 = document.getElementById("tab2");

    if (index === 0) {
        track.style.transform = "translateX(0%)";
        t1.classList.add("active");
        t2.classList.remove("active");
    } else {
        track.style.transform = "translateX(-50%)"; // Shift to see page 2
        t2.classList.add("active");
        t1.classList.remove("active");
    }
}

// 5. Native Touch Swipe Detection Logic
let touchStartX = 0;
let touchEndX = 0;
const sliderViewport = document.querySelector('.slider-viewport');

sliderViewport.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
}, { passive: true });

sliderViewport.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipeGesture();
}, { passive: true });

function handleSwipeGesture() {
    const swipeThreshold = 50; // minimum distance in pixels to count as a swipe
    if (touchStartX - touchEndX > swipeThreshold) {
        // Swiped Left -> View next page (Pihak Lelaki)
        switchContactTab(1);
    }
    if (touchEndX - touchStartX > swipeThreshold) {
        // Swiped Right -> View previous page (Pihak Perempuan)
        switchContactTab(0);
    }
}
// Data derived cleanly from the wedding invitation card[cite: 1]

        dateStr: "Sabtu, 29 Ogos 2026", //[cite: 1]
        hijriStr: "16 Rabiulawal 1448", //[cite: 1]

        venue: "LOT 525, Kg Pohon Buloh, Pasir Mas, Kelantan.", //[cite: 1]
        mapsUrl: "https://maps.app.goo.gl/K8B81AwwJ2ubPX6b9", //[cite: 1]
        wazeUrl: "https://waze.com/ul?q=LOT+525+Kg+Pohon+Buloh+Pasir+Mas+Kelantan", //[cite: 1]
    },
    lelaki: {
        targetDate: "2026-10-24T11:00:00", //[cite: 1]
        dateStr: "Sabtu, 24 Okt 2026", //[cite: 1]
        hijriStr: "13 Jamadilawal 1448", //[cite: 1]
        timeStr: "11:00 AM - 4:30 PM (Bersanding: 11:15 AM)", //[cite: 1]
        venue: "Bagan Serai Wedding Hall, Bagan Serai, Perak.", //[cite: 1]
        mapsUrl: "https://maps.app.goo.gl/G7q1YJeRBPmo55dL8", //[cite: 1]
        wazeUrl: "https://waze.com/ul?q=Bagan+Serai+Wedding+Hall+Perak", //[cite: 1]
    }
};

let currentSide = 'perempuan';
let countdownInterval;

function switchEvent(side) {
    currentSide = side;
    
    // Toggle active status UI on side switcher buttons
    document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
    const index = side === 'perempuan' ? 0 : 1;
    document.querySelectorAll('.toggle-btn')[index].classList.add('active');
    
    // Update Information Display Panel
    const data = weddingData[side];
    document.getElementById('event-info').innerHTML = `
        <div class="info-label">Tarikh Majlis</div>
        <div class="info-value">${data.dateStr}<br><span style="font-size:0.8rem; font-weight:normal; color:var(--text-muted);">${data.hijriStr}</span></div>
        <div class="info-label">Aturcara Majlis</div>
        <div class="info-value">${data.timeStr}</div>
        <div class="info-label">Lokasi</div>
        <div class="info-value">${data.venue}</div>
    `;

    // Update Maps Section Layout Strings & Links
    document.getElementById('go-maps').href = data.mapsUrl;
    document.getElementById('go-waze').href = data.wazeUrl;

    // Render Contact Panel Directory
   

    // Reset and restart countdown clocks matching event selection
    clearInterval(countdownInterval);
    startCountdown(data.targetDate);
}

function startCountdown(dateString) {
    const targetTime = new Date(dateString).getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const difference = targetTime - now;

        if (difference <= 0) {
            document.getElementById('days').innerText = "00";
            document.getElementById('hours').innerText = "00";
            document.getElementById('mins').innerText = "00";
            document.getElementById('secs').innerText = "00";
            clearInterval(countdownInterval);
            return;
        }

        const d = Math.floor(difference / (1000 * 60 * 60 * 24));
        const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((difference % (1000 * 60)) / 1000);

        document.getElementById('days').innerText = d < 10 ? '0' + d : d;
        document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
        document.getElementById('mins').innerText = m < 10 ? '0' + m : m;
        document.getElementById('secs').innerText = s < 10 ? '0' + s : s;
    }

    updateTimer();
    countdownInterval = setInterval(updateTimer, 1000);
}

// Initialize layout configurations on mount
switchEvent('perempuan');
    </script>
